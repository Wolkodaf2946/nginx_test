
server {
    listen 80;
    server_name mchs-simulator.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;                                  # HTTP/2 поверх TLS — быстрее
    server_name mchs-simulator.ru;

    # Сертификаты от Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/mchs-simulator.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mchs-simulator.ru/privkey.pem;

    # Современные настройки TLS
    ssl_protocols       TLSv1.2 TLSv1.3;       # старьё (1.0/1.1) выключено
    ssl_prefer_server_ciphers off;             # для TLS1.3 выбор шифра за клиентом
    ssl_session_cache   shared:SSL:10m;        # кэш сессий → меньше рукопожатий
    ssl_session_timeout 1d;

    # HSTS: браузер запомнит ходить только по HTTPS (год). Включай, когда уверен,
    # что HTTPS работает стабильно — откатить сложно (браузеры кэшируют).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;


    location /api/ {
        # zone=api_limit - имя зоны лимита, которая была создана в nginx.conf
        # burst=20 - очередь-буфер: разрешаем всплеск до 20 запросов сверх нормы rate
        # nodelay - запросы из очереди burst обслуживаются СРАЗУ, без искусственной
        #           задержки (слоты освобождаются со скоростью rate). Превышение
        #           rate+burst даёт 503 в любом случае — это от nodelay не зависит.
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend:8080;    # "backend" — имя сервиса в compose

        proxy_set_header Host              $host; # какой хост отдавать бэку (чтобы бэк понимал, к какому домену пришел запрос)
        proxy_set_header X-Real-IP         $remote_addr; # какой IP отдавать бэку (чтобы бэк понимал, откуда пришел запрос)
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for; # какой IP отдавать бэку (чтобы бэк понимал, откуда пришел запрос, если есть несколько прокси)
        proxy_set_header X-Forwarded-Proto $scheme; # какой протокол отдавать бэку (чтобы бэк понимал, по какому протоколу пришел запрос)

        proxy_connect_timeout 5s;    # сколько ждать установки соединения с бэком
        proxy_send_timeout   10s;    # таймаут на отправку запроса бэку
        proxy_read_timeout   30s;    # сколько ждать ответа бэка (частый источник 504)
    }

    location / { # всё, кроме /api — на nginx фронт-контейнера (он раздаёт статику)
        proxy_pass http://frontend:80; # было :4173 (vite preview); теперь nginx фронта

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

