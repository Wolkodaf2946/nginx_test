server {
    listen 80; # какой порт слушать
    server_name localhost; # для какого домена/хоста этот сервер (виртуальный хост)

    root /usr/share/nginx/html; # корневая директория, откуда отдавать файлы
    index index.html; # какой файл отдавать по умолчанию, если в запросе не указан конкретный файл

    location /api/ {
        # zone=api_limit - имя зоны лимита, которая была создана в nginx.conf
        # burst=20 - очередь-буфер: разрешаем всплеск до 20 запросов сверх нормы rate
        # nodelay - запросы из очереди burst обслуживаются СРАЗУ, без искусственной
        #           задержки (слоты освобождаются со скоростью rate). Превышение
        #           rate+burst даёт 503 в любом случае — это от nodelay не зависит.
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend:8080;    # "backend" — имя сервиса в compose

        proxy_set_header Host              $host; # какой хост отдавать бэку (чтобы бэк понимал, к какому домену пришел запрос)
        proxy_set_header X-Real-IP         $remote_addr; # какой IP отдавать бэку (чтобы бэк понимал, откуда пришел запрос)
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for; # какой IP отдавать бэку (чтобы бэк понимал, откуда пришел запрос, если есть несколько прокси)
        proxy_set_header X-Forwarded-Proto $scheme; # какой протокол отдавать бэку (чтобы бэк понимал, по какому протоколу пришел запрос)

        proxy_connect_timeout 5s;    # сколько ждать установки соединения с бэком
        proxy_send_timeout   10s;    # таймаут на отправку запроса бэку
        proxy_read_timeout   30s;    # сколько ждать ответа бэка (частый источник 504)
    }

    location / { # если запрошен корень сайта (например, http://localhost/), то
        proxy_pass http://frontend:4173; # проксируем запрос на фронтенд-сервис

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

