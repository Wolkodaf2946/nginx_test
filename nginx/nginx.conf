# =============================================================================
#  ОСНОВЫ СИНТАКСИСА (прочитай сначала это)
# =============================================================================
#  1. Комментарий начинается с #  — nginx игнорирует всё до конца строки.
#
#  2. Есть ровно ДВА вида конструкций:
#
#     а) ПРОСТАЯ ДИРЕКТИВА:   имя  значение;      ← обязательно ; в конце
#        Пример:              sendfile  on;
#        Это "настройка = значение". Точка с запятой — конец инструкции,
#        как в C/Go. Забудешь ; → ошибка "unexpected end of file".
#
#     б) БЛОЧНАЯ ДИРЕКТИВА (контекст):   имя { ... }   ← БЕЗ ; после }
#        Пример:              events { worker_connections 1024; }
#        Это "раздел настроек". Внутри { } лежат другие директивы.
#
#  3. КОНТЕКСТ = область видимости. Директива работает только там, где стоит,
#     и НАСЛЕДУЕТСЯ во вложенные блоки. Поставишь директиву не в тот контекст —
#     получишь ошибку вида '"worker_connections" directive is not allowed here'.
#
#  Иерархия контекстов в этом файле:
#     main (сам файл, верхний уровень — без обёртки)
#       └── events { }   — как работать с соединениями
#       └── http    { }   — всё про HTTP
#             └── (server { } лежат в conf.d/*.conf, подключаются в самом низу)
# =============================================================================


# --- ДИРЕКТИВА 1: worker_processes (контекст: main) -------------------------
#
#  ЧТО: сколько рабочих процессов (worker) запустить. Именно воркеры принимают
#       и обрабатывают все соединения (см. Часть 1 курса: master + воркеры).
#  ЗНАЧЕНИЕ auto: nginx сам возьмёт число = количеству ядер CPU. Это оптимум,
#       потому что каждый воркер эффективно загружает одно ядро.
#  ПОЧЕМУ/ЗАЧЕМ: 1 воркер = используется только 1 ядро, остальные простаивают.
#       Слишком много воркеров = лишние переключения контекста. auto = золотая
#       середина.
#  ОБЯЗАТЕЛЬНА? Нет. По умолчанию 1. Но на многоядерной машине без неё ты
#       используешь лишь одно ядро — потеря производительности.
#  ПРИМЕРЫ:
#       worker_processes 1;      # ровно один воркер (удобно для отладки)
#       worker_processes 4;      # ровно четыре
#       worker_processes auto;   # = числу ядер (рекомендуется)
#
#  ВНИМАНИЕ: в твоём файле было "worker_proceses" (пропущена буква s).
#  nginx не знает такой директивы и упадёт с "unknown directive". Директивы
#  сверяются по точному имени — опечатка = мгновенная ошибка. Исправлено:
worker_processes auto;


# --- КОНТЕКСТ events (контекст: main) ---------------------------------------
#
#  ЧТО: блок настроек уровня СОЕДИНЕНИЙ (транспортный уровень, не HTTP).
#       Здесь настраивается, как воркеры принимают подключения.
#  ПОЧЕМУ отдельный блок: соединение (TCP) — это уровень ниже, чем HTTP-запрос.
#       Поэтому его настройки живут не в http { }, а в отдельном events { }.
#  ОБЯЗАТЕЛЬНА? Да, блок events { } обязан присутствовать (может быть пустым,
#       но должен быть). Без него nginx выдаст ошибку "no "events" section".
events {

    # --- ДИРЕКТИВА: worker_connections (контекст: events) -------------------
    #
    #  ЧТО: максимум одновременных соединений, которые может держать ОДИН воркер.
    #  ЗНАЧЕНИЕ 1024: каждый воркер потянет до 1024 открытых соединений.
    #  МАТЕМАТИКА (частый вопрос на собесе): теоретический потолок всего сервера
    #       = worker_processes × worker_connections.
    #       Пример: 4 ядра × 1024 = 4096 одновременных соединений.
    #  ВАЖНО про прокси: при проксировании один клиент = ДВА соединения
    #       (клиент↔nginx и nginx↔бэкенд), так что реальная ёмкость вдвое меньше.
    #  ОБЯЗАТЕЛЬНА? Нет, по умолчанию 512. Но её почти всегда задают явно.
    #  ПРИМЕР:
    #       worker_connections 4096;  # для нагруженного сервера
    worker_connections 1024;
}


# --- КОНТЕКСТ http (контекст: main) -----------------------------------------
#
#  ЧТО: главный блок — здесь живёт ВСЁ, что связано с HTTP. 99% твоих настроек
#       будут внутри него: сайты (server), проксирование, gzip, логи, кэш.
#  ПОЧЕМУ: nginx умеет не только HTTP (есть ещё блок stream для TCP/UDP).
#       http { } чётко отделяет HTTP-часть от остального.
#  ОБЯЗАТЕЛЬНА? Для веб-сервера — да. Без http { } nginx не будет обрабатывать
#       веб-запросы (хотя формально может работать как, например, TCP-прокси).
http {

    # --- ДИРЕКТИВА: include (контекст: http) --------------------------------
    #
    #  ЧТО: подключить (вставить) содержимое другого файла в это место, как
    #       будто ты вписал его руками. Обычный способ разбить конфиг на части.
    #  ЗДЕСЬ: mime.types — файл-таблица соответствий "расширение → Content-Type".
    #       Например, он говорит: .css → text/css, .js → application/javascript,
    #       .png → image/png, .json → application/json.
    #  ЗАЧЕМ ЭТО НУЖНО: когда nginx отдаёт файл, он должен сказать браузеру в
    #       заголовке Content-Type, ЧТО это за файл. Без mime.types все файлы
    #       уедут с типом по умолчанию (см. следующую директиву), и браузер,
    #       например, покажет твой .css как простой текст вместо стилей.
    #  ОБЯЗАТЕЛЬНА? Технически нет, но без неё раздача статики сломается —
    #       стили и скрипты не применятся. Для web-сервера — практически must have.
    include /etc/nginx/mime.types;

    # --- ДИРЕКТИВА: default_type (контекст: http) ---------------------------
    #
    #  ЧТО: какой Content-Type ставить, если в mime.types не нашлось совпадения
    #       по расширению файла.
    #  ЗНАЧЕНИЕ application/octet-stream: "неизвестные бинарные данные". Браузер,
    #       получив такой тип, обычно предложит СКАЧАТЬ файл, а не открыть.
    #  ЗАЧЕМ: безопасный fallback. Лучше предложить скачивание, чем неверно
    #       интерпретировать содержимое.
    #  ОБЯЗАТЕЛЬНА? Нет, по умолчанию как раз text/plain. Задают для явности.
    #  ПРИМЕР: если отдать файл без расширения — уедет с этим типом.
    default_type application/octet-stream;

    # --- ДИРЕКТИВА: sendfile (контекст: http) -------------------------------
    #
    #  ЧТО: включить системный вызов sendfile() для отдачи файлов.
    #  КАК РАБОТАЕТ: файл копируется из дискового кэша ядра ПРЯМО в сетевой
    #       сокет, минуя память процесса nginx. Это называется "zero-copy".
    #  БЕЗ sendfile: данные идут диск → ядро → память nginx → ядро → сеть
    #       (два лишних копирования).
    #  С sendfile:    данные идут диск → ядро → сеть (копирований меньше).
    #  ЗАЧЕМ: заметно ускоряет раздачу статики и снижает нагрузку на CPU.
    #  ОБЯЗАТЕЛЬНА? Нет (по умолчанию off), но для раздачи файлов её всегда
    #       включают. Разбор в Части 10 курса.
    sendfile on;

    # --- ДИРЕКТИВА: keepalive_timeout (контекст: http) ----------------------
    #
    #  ЧТО: сколько секунд держать открытым бездействующее (keep-alive)
    #       соединение с клиентом, ожидая от него следующий запрос.
    #  ЗАЧЕМ: установка TCP-соединения стоит дорого (three-way handshake,
    #       см. Часть 0). Keep-alive позволяет отправить несколько запросов
    #       по ОДНОМУ соединению, не открывая новое каждый раз.
    #  ЗНАЧЕНИЕ 65: подождать 65 секунд нового запроса, потом закрыть соединение.
    #  БАЛАНС: больше значение = меньше рукопожатий, но соединения дольше висят
    #       и занимают ресурсы. 65 — разумный дефолт.
    #  ОБЯЗАТЕЛЬНА? Нет (по умолчанию 75s). Часто задают явно.
    #  ПРИМЕР:
    #       keepalive_timeout 0;   # полностью отключить keep-alive
    keepalive_timeout 65;

    # --- ДИРЕКТИВА: include (контекст: http) --------------------------------
    #
    #  ЧТО: подключить ВСЕ файлы, подходящие под маску /etc/nginx/conf.d/*.conf.
    #       Символ * — это "любое имя". Так подтянутся default.conf, api.conf и
    #       любые другие .conf из этой папки.
    #  ЗАЧЕМ: разделение ответственности. В этом файле — настройки "движка"
    #       (воркеры, http-общее). А конкретные САЙТЫ (блоки server { }) лежат
    #       отдельными файлами в conf.d/. Так конфиг не превращается в простыню.
    #  ГДЕ ИМЕННО ВСТАВЛЯЕТСЯ: ровно здесь, внутри http { }. Поэтому все server-
    #       блоки из conf.d/ автоматически оказываются внутри http-контекста —
    #       где им и место (server можно объявлять только внутри http).
    #  ОБЯЗАТЕЛЬНА? Нет, но без неё nginx не увидит твои сайты из conf.d/ и будет
    #       отдавать пустоту / дефолт. Это стандартный паттерн (так делает и
    #       официальный Docker-образ).
    #  ПРИМЕР порядка: файлы подключаются в алфавитном порядке имён.
    include /etc/nginx/conf.d/*.conf;
}
