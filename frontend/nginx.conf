# Веб-сервер фронт-контейнера: раздаёт собранную статику React на :80.
# Это ВНУТРЕННИЙ nginx — снаружи в него ходит только edge-nginx.
# /api сюда не приходит (его проксирует edge-nginx на бэкенд), TLS тоже на edge.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA-fallback: неизвестный путь → index.html, чтобы работал роутинг React.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ассеты Vite содержат хэш в имени → можно кэшировать надолго.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
