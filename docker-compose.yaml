services:
  backend:
    build: ./backend
    container_name: todo_backend
    expose:
      - "8080"                               # виден только внутри сети, не наружу
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Относительный путь: браузер шлёт на /api, а nginx проксирует на бэкенд.
        # Тот же origin (localhost:80) → CORS не нужен.
        # Нельзя писать http://backend:8080 — имя "backend" резолвится только
        # ВНУТРИ Docker-сети, а этот код выполняется в браузере на хосте.
        VITE_API_URL: /api
    container_name: todo_frontend
    expose:
      - "80"                                 # nginx фронта, виден только внутри сети
    restart: unless-stopped


  nginx:
    image: nginx:1.27-alpine
    container_name: todo_nginx
    ports:
      - "80:80"                              # HTTP
      - "443:443"                            # HTTPS (заработает после выпуска сертификата, Часть 9.5)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro    # ACME-challenge для certbot
      - ./certbot/conf:/etc/letsencrypt:ro   # сертификаты Let's Encrypt
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: todo_certbot
    volumes:
      - ./certbot/www:/var/www/certbot:rw           # те же папки, но на запись
      - ./certbot/conf:/etc/letsencrypt:rw
    # по умолчанию простаивает; запускаем вручную командой ниже
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 6h & wait $${!}; certbot renew; done'"